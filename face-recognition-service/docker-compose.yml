version: '3.8'

services:
  # Face Recognition Service
  face-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL
      - FACE_RECOGNITION_THRESHOLD
      - FACE_DETECTION_THRESHOLD
      - LIVENESS_THRESHOLD
      - BACKEND_API_BASE_URL
      - HR_API_KEY
      - CAMERA_URL
      - DOOR_ENABLED
      - CAMERAS_ENABLED
      - DET_SIZE
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app        # Код приложения (разработка)
      - ./alembic:/app/alembic  # Миграции
      - ./models:/app/models    # Модели ML
